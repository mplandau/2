<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sports Analytics Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c0e;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 280px;
            background-color: #141416;
            border-right: 1px solid #232326;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            color: #00e676;
            font-size: 1.3rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .league-btn {
            background-color: #1c1c1f;
            border: 1px solid #2d2d31;
            color: #bcbcbc;
            padding: 14px 16px;
            text-align: left;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .league-btn:hover, .league-btn.active {
            background-color: #00e676;
            color: #0c0c0e;
            border-color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.2);
        }

        /* Main Dashboard Canvas */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        header {
            margin-bottom: 40px;
        }
        header h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            font-weight: 800;
        }
        header p { 
            margin: 8px 0 0 0; 
            color: #72727a; 
            font-size: 1.05rem;
        }

        /* Live Data Grid Matrix */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: #141416;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #232326;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            text-align: center;
        }
        .card img {
            max-width: 70px;
            height: auto;
            margin-bottom: 15px;
        }
        .card h3 { 
            margin: 0 0 5px 0; 
            font-size: 1.3rem; 
            color: #ffffff; 
        }
        .card p {
            margin: 6px 0;
            color: #72727a;
            font-size: 0.95rem;
        }
        .highlight-text {
            color: #00e676;
            font-weight: bold;
        }
        .spinner {
            text-align: center;
            font-size: 1.2rem;
            color: #00e676;
            padding: 5px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📊 Live Feeds</h2>
        <button class="league-btn active" onclick="connectLiveAPI('4387', 'NBA Basketball', this)">🏀 NBA Basketball</button>
        <button class="league-btn" onclick="connectLiveAPI('4391', 'NFL Football', this)">🏈 NFL Football</button>
        <button class="league-btn" onclick="connectLiveAPI('4424', 'MLB Baseball', this)">⚾ MLB Baseball</button>
        <button class="league-btn" onclick="connectLiveAPI('4328', 'English Premier League', this)">⚽ Premier League</button>
    </div>

    <div class="main-content">
        <header>
            <h1 id="dashboard-title">Live Sports Database</h1>
            <p id="dashboard-desc">Connecting to live global sports registries...</p>
        </header>

        <div id="loading-spinner" class="spinner">⚡ FETCHING LIVE LEAGUE REGISTRY...</div>
        <div id="data-matrix-grid" class="grid"></div>
    </div>

    <script>
        window.onload = function() {
            connectLiveAPI('4387', 'NBA Basketball', document.querySelector('.league-btn.active'));
        };

        function connectLiveAPI(leagueId, leagueName, controlBtn) {
            document.querySelectorAll('.league-btn').forEach(btn => btn.classList.remove('active'));
            controlBtn.classList.add('active');

            const container = document.getElementById('data-matrix-grid');
            const spinner = document.getElementById('loading-spinner');
            
            container.innerHTML = '';
            spinner.style.display = 'block';

            document.getElementById('dashboard-title').innerText = leagueName;

            // Connecting directly to an open mirror database bypass proxy to prevent CORS blocks
            const apiURL = `https://corsproxy.io/?` + encodeURIComponent(`https://www.thesportsdb.com/api/v1/json/3/lookup_all_teams.php?id=${leagueId}`);

            fetch(apiURL)
                .then(res => res.json())
                .then(data => {
                    spinner.style.display = 'none';
                    if (!data.teams) {
                        container.innerHTML = `<p style="color:#ff5252;">No active network response. Try another feed.</p>`;
                        return;
                    }

                    // Loop through EVERY SINGLE TEAM in the live database automatically
                    data.teams.forEach(team => {
                        const cardElement = document.createElement('div');
                        cardElement.className = 'card';
                        
                        cardElement.innerHTML = `
                            <img src="${team.strBadge}/preview" alt="Logo">
                            <h3>${team.strTeam}</h3>
                            <p><span class="highlight-text">🏟️ Stadium:</span> ${team.strStadium || 'N/A'}</p>
                            <p><span class="highlight-text">📍 Location:</span> ${team.strStadiumLocation || 'Global Rec'}</p>
                            <p><span class="highlight-text">🗓️ Founded:</span> Year ${team.strFormedYear || 'N/A'}</p>
                        `;
                        container.appendChild(cardElement);
                    });
                })
                .catch(err => {
                    spinner.style.display = 'none';
                    container.innerHTML = `<p style="color:#ff5252;">Data stream blocked. Try another selection.</p>`;
                    console.error(err);
                });
        }
    </script>

</body>
</html>
