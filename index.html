<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Analytics Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c0e;
            color: #ffffff;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 2px solid #00e676;
            padding-bottom: 20px;
        }
        header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 800;
            color: #00e676;
        }
        header p { 
            margin: 8px 0 0 0; 
            color: #72727a; 
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: #141416;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #232326;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #232326;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .card h3 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: #ffffff; 
        }
        .record-badge {
            background-color: #1c1c1f;
            color: #00e676;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 0.95rem;
        }
        .stat-label { color: #72727a; }
        .stat-value { font-weight: 600; color: #f4f4f5; }
        
        .roster-section {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px dashed #232326;
        }
        .roster-title {
            font-size: 0.8rem;
            color: #72727a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }
        .player-tag {
            display: inline-block;
            background-color: #1c1c1f;
            color: #29b6f6;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin: 4px 4px 4px 0;
            border: 1px solid #232326;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏀 NBA Pro Analytics Hub</h1>
        <p>Active team standings, core performance metrics, and roster selections.</p>
    </header>

    <div id="nba-grid" class="grid"></div>

    <script>
        const nbaTeams = [
            { team: "Boston Celtics", division: "Eastern - Atlantic", marker: "64-18", stats: { PPG: "120.6", RPG: "46.3", APG: "26.9" }, roster: ["Jayson Tatum", "Jaylen Brown", "Kristaps Porziņģis", "Derrick White"] },
            { team: "Los Angeles Lakers", division: "Western - Pacific", marker: "47-35", stats: { PPG: "118.0", RPG: "43.1", APG: "28.5" }, roster: ["LeBron James", "Anthony Davis", "D'Angelo Russell", "Austin Reaves"] },
            { team: "Golden State Warriors", division: "Western - Pacific", marker: "46-36", stats: { PPG: "117.8", RPG: "46.7", APG: "29.3" }, roster: ["Stephen Curry", "Draymond Green", "Andrew Wiggins", "Jonathan Kuminga"] },
            { team: "New York Knicks", division: "Eastern - Atlantic", marker: "50-32", stats: { PPG: "112.8", RPG: "45.2", APG: "24.4" }, roster: ["Jalen Brunson", "Karl-Anthony Towns", "OG Anunoby", "Josh Hart"] },
            { team: "Oklahoma City Thunder", division: "Western - Northwest", marker: "57-25", stats: { PPG: "120.1", RPG: "42.0", APG: "27.1" }, roster: ["Shai Gilgeous-Alexander", "Chet Holmgren", "Jalen Williams"] },
            { team: "Denver Nuggets", division: "Western - Northwest", marker: "57-25", stats: { PPG: "114.9", RPG: "44.4", APG: "29.5" }, roster: ["Nikola Jokić", "Jamal Murray", "Aaron Gordon", "Michael Porter Jr."] },
            { team: "Dallas Mavericks", division: "Western - Southwest", marker: "50-32", stats: { PPG: "117.9", RPG: "42.9", APG: "25.7" }, roster: ["Luka Dončić", "Kyrie Irving", "Klay Thompson", "P.J. Washington"] },
            { team: "Milwaukee Bucks", division: "Eastern - Central", marker: "49-33", stats: { PPG: "119.0", RPG: "44.2", APG: "26.2" }, roster: ["Giannis Antetokounmpo", "Damian Lillard", "Khris Middleton"] }
        ];

        const container = document.getElementById('nba-grid');
        
        nbaTeams.forEach(item => {
            const cardElement = document.createElement('div');
            cardElement.className = 'card';
            
            let dataMetricRows = '';
            for (const [metricLabel, metricVal] of Object.entries(item.stats)) {
                dataMetricRows += `
                    <div class="stat-row">
                        <span class="stat-label">${metricLabel}</span>
                        <span class="stat-value">${metricVal}</span>
                    </div>`;
            }

            let playerTags = '';
            item.roster.forEach(player => {
                playerTags += `<span class="player-tag">${player}</span>`;
            });

            cardElement.innerHTML = `
                <div class="card-header">
                    <div>
                        <h3>${item.team}</h3>
                        <span style="font-size:0.85rem; color:#72727a;">${item.division}</span>
                    </div>
                    <span class="record-badge">${item.marker}</span>
                </div>
                ${dataMetricRows}
                <div class="roster-section">
                    <span class="roster-title">Core Roster Selection</span>
                    ${playerTags}
                </div>
            `;
            container.appendChild(cardElement);
        });
    </script>

</body>
</html>
