<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sports Hub Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Interactive Sidebar */
        .sidebar {
            width: 260px;
            background-color: #1a1a1a;
            border-right: 2px solid #00e676;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            color: #00e676;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .league-btn {
            background: none;
            border: 1px solid #333;
            color: #aaa;
            padding: 12px 15px;
            text-align: left;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .league-btn:hover, .league-btn.active {
            background-color: #00e676;
            color: #121212;
            font-weight: bold;
            border-color: #00e676;
        }

        /* Main Display Dashboard */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #121212;
            box-sizing: border-box;
        }
        header {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,230,118,0.05);
        }
        header h1 { margin: 0; color: #fff; font-size: 2rem; }
        header p { margin: 5px 0 0 0; color: #888; }

        /* Team and Player Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d2d2d;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.3rem; color: #00e676; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .card p { margin: 5px 0; color: #eee; font-size: 0.95rem; }
        .card .label { color: #888; font-size: 0.85rem; display: block; margin-top: 8px;}
        .card .player-list { color: #29b6f6; font-weight: 500; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🌍 Sports Leagues</h2>
        <button class="league-btn active" onclick="loadLeague('nba', this)">🏀 NBA Basketball</button>
        <button class="league-btn" onclick="loadLeague('nfl', this)">🏈 NFL Football</button>
        <button class="league-btn" onclick="loadLeague('mlb', this)">⚾ MLB Baseball</button>
        <button class="league-btn" onclick="loadLeague('epl', this)">⚽ Premier League</button>
    </div>

    <div class="main-content">
        <header>
            <h1 id="league-title">🏆 Global Teams & Player Profiles Hub</h1>
            <p>Live automated data pipeline database engine</p>
        </header>

        <div id="sports-grid" class="grid"></div>
    </div>

    <script>
        // Open sports database map directly
        const sportsData = {
            nba: [
                { name: "Boston Celtics", city: "Boston", stadium: "TD Garden", players: "Jayson Tatum, Jaylen Brown, Jrue Holiday" },
                { name: "Los Angeles Lakers", city: "Los Angeles", stadium: "Crypto.com Arena", players: "LeBron James, Anthony Davis, Austin Reaves" },
                { name: "Golden State Warriors", city: "San Francisco", stadium: "Chase Center", players: "Stephen Curry, Draymond Green, Andrew Wiggins" },
                { name: "New York Knicks", city: "New York", stadium: "Madison Square Garden", players: "Jalen Brunson, OG Anunoby, Julius Randle" },
                { name: "Milwaukee Bucks", city: "Milwaukee", stadium: "Fiserv Forum", players: "Giannis Antetokounmpo, Damian Lillard" }
            ],
            nfl: [
                { name: "Kansas City Chiefs", city: "Kansas City", stadium: "GEHA Field at Arrowhead", players: "Patrick Mahomes, Travis Kelce, Isiah Pacheco" },
                { name: "San Francisco 49ers", city: "Santa Clara", stadium: "Levi's Stadium", players: "Brock Purdy, Christian McCaffrey, Deebo Samuel" },
                { name: "Dallas Cowboys", city: "Arlington", stadium: "AT&T Stadium", players: "Dak Prescott, CeeDee Lamb, Micah Parsons" },
                { name: "New York Jets", city: "East Rutherford", stadium: "MetLife Stadium", players: "Aaron Rodgers, Breece Hall, Garrett Wilson" }
            ],
            mlb: [
                { name: "Los Angeles Dodgers", city: "Los Angeles", stadium: "Dodger Stadium", players: "Shohei Ohtani, Mookie Betts, Freddie Freeman" },
                { name: "New York Yankees", city: "New York", stadium: "Yankee Stadium", players: "Aaron Judge, Juan Soto, Gerrit Cole" },
                { name: "Atlanta Braves", city: "Atlanta", stadium: "Truist Park", players: "Ronald Acuña Jr., Matt Olson, Austin Riley" },
                { name: "Chicago Cubs", city: "Chicago", stadium: "Wrigley Field", players: "Cody Bellinger, Dansby Swanson, Nico Hoerner" }
            ],
            epl: [
                { name: "Manchester City", city: "Manchester", stadium: "Etihad Stadium", players: "Erling Haaland, Kevin De Bruyne, Phil Foden" },
                { name: "Arsenal FC", city: "London", stadium: "Emirates Stadium", players: "Bukayo Saka, Martin Ødegaard, Declan Rice" },
                { name: "Liverpool FC", city: "Liverpool", stadium: "Anfield", players: "Mohamed Salah, Virgil van Dijk, Luis Díaz" },
                { name: "Manchester United", city: "Manchester", stadium: "Old Trafford", players: "Bruno Fernandes, Marcus Rashford, Alejandro Garnacho" }
            ]
        };

        window.onload = function() {
            loadLeague('nba', document.querySelector('.league-btn.active'));
        };

        function loadLeague(leagueKey, buttonElement) {
            document.querySelectorAll('.league-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const grid = document.getElementById('sports-grid');
            grid.innerHTML = ''; 

            const teams = sportsData[leagueKey];
            
            teams.forEach(team => {
                const teamCard = document.createElement('div');
                teamCard.className = 'card';
                teamCard.innerHTML = `
                    <h3>${team.name}</h3>
                    <p><strong>📍 Location:</strong> ${team.city}</p>
                    <p><strong>🏟️ Stadium:</strong> ${team.stadium}</p>
                    <span class="label">⭐ KEY PLAYERS & ROSTER:</span>
                    <p class="player-list">${team.players}</p>
                `;
                grid.appendChild(teamCard);
            });
        }
    </script>

</body>
</html>
