<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Sports Data Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-bottom: 4px solid #00e676;
        }
        h1 { margin: 0; color: #00e676; }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }
        .card h3 { margin-top: 0; color: #29b6f6; }
        .status { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 Ultimate Sports Data & Analytics Hub</h1>
        <p>Live scores, historical stats, and deep analytics</p>
    </header>

    <div class="container">
        <div class="card">
            <h3>🏈 NFL Football</h3>
            <p class="status">Data connection pending...</p>
        </div>
        <div class="card">
            <h3>🏀 NBA Basketball</h3>
            <p class="status">Data connection pending...</p>
        </div>
        <div class="card">
            <h3>⚾ MLB Baseball</h3>
            <p class="status">Data connection pending...</p>
        </div>
    </div>

</body>
</html>
